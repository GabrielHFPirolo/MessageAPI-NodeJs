<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/admin.css">
    <title>Painel Administrativo</title>
</head>
<body>
    <div class="admin-wrapper">

        <header class="admin-header">
            <h1>Painel de Atividades</h1>
            <button onclick="window.location.href='index.html'" class="btn-voltar">
                Voltar
            </button>
        </header>

        <section class="admin-metricas">
            <!-- Cards principais -->
            <div class="card" id="card-tempo"></div>
            <div class="card" id="card-total-iniciados"></div>
            <div class="card" id="card-total-finalizados"></div>
        </section>

        <section class="admin-listas">
            <div class="lista-box">
                <h2>Iniciados por Usuário</h2>
                <ul id="lista-iniciados"></ul>
            </div>

            <div class="lista-box">
                <h2>Finalizados por Usuário</h2>
                <ul id="lista-finalizados"></ul>
            </div>

            <div class="lista-box">
                <h2>Em Andamento</h2>
                <ul id="lista-andamento"></ul>
            </div>
        </section>

        <section class="admin-table-section">
            <h2>Últimos Atendimentos</h2>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuário</th>
                        <th>Status</th>
                        <th>Início</th>
                        <th>Conclusão</th>
                        <th>Tempo</th>
                    </tr>
                </thead>

                <tbody id="admin-table-body">                    
                </tbody>
            </table>
        </section>
        
        <section class="grafico-box">
            <div class="grafico-header">
                <div>
                    <h2>Relação de Atendimentos</h2>
                    <p class="grafico-subtitle">
                        Visão consolidada dos status atuais
                    </p>
                </div>
            </div>
              
            <div class="grafico-container">
                <canvas id="graficoAtendimentos"></canvas>
            </div>
        </section>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="./js/admin.js" defer></script>
</body>
</html>
